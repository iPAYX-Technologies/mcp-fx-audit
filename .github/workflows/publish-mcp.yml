name: Publish to MCP Registry

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to MCP Registry
        uses: actions/github-script@v7
        with:
          script: |
            const response = await fetch('https://registry.mcphub.io/publish', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${{ secrets.MCP_REGISTRY_TOKEN }}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                name: 'ipayx-fx-audit',
                version: context.ref.replace('refs/tags/', ''),
                url: 'https://wild-bird-a412.ybolduc.workers.dev/mcp'
              })
            });
            console.log('Status:', response.status);
