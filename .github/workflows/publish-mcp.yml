name: Publish to MCP Registry

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to MCP Registry
        uses: actions/github-script@v7
        env:
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
        with:
          script: |
            const token = process.env.MCP_REGISTRY_TOKEN;
            if (!token) {
              core.setFailed('SECRET MANQUANT: MCP_REGISTRY_TOKEN non defini dans GitHub Secrets');
              return;
            }
            const version = context.ref.startsWith('refs/tags/')
              ? context.ref.replace('refs/tags/', '')
              : 'v1.0.0';
            console.log('Publishing version:', version);
            const response = await fetch('https://registry.mcphub.io/publish', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                name: 'ipayx-fx-audit',
                version: version,
                url: 'https://wild-bird-a412.ybolduc.workers.dev/mcp'
              })
            });
            const body = await response.text();
            console.log('Status:', response.status);
            console.log('Response:', body);
            if (!response.ok) {
              core.setFailed(`Registry publish failed: ${response.status} - ${body}`);
            } else {
              console.log('Published successfully to MCP Registry!');
            }
